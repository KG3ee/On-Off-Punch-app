services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ./api.env
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "127.0.0.1:4000:4000"

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    env_file:
      - ./web.env
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"

  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    environment:
      WEB_DOMAIN: ${WEB_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
